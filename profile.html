<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Profile</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial;
      }

      body {
        height: 100vh;
        background: linear-gradient(180deg, #000000, #07123b);
        color: white;
      }

      ::-webkit-scrollbar {
        width: 5px;
      }

      ::-webkit-scrollbar-track {
        background: #020617;
      }

      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #03265b);
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #0d50a1);
      }

      /* PAGE CENTER */

      .page {
        display: flex;
        justify-content: center;
      }

      .profile {
        width: 900px;
        max-width: 95%;
      }

      /* HEADER */

      .profile-header {
        display: flex;
        gap: 40px;
        padding: 40px 0;
        align-items: center;
      }

      .profile-img {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #333;
      }

      .profile-info {
        flex: 1;
      }

      .username {
        font-size: 26px;
        font-weight: bold;
      }

      .fullname {
        margin-top: 6px;
        color: #aaa;
      }

      .stats {
        margin-top: 10px;
        font-size: 16px;
        color: #ccc;
      }

      /* BUTTONS */

      .buttons {
        display: flex;
        gap: 10px;
        margin-top: 15px;
      }

      .btn {
        background: #262626;
        border: none;
        padding: 8px 18px;
        border-radius: 8px;
        color: white;
        cursor: pointer;
      }

      .btn:hover {
        background: #333;
      }

      /* POSTS TAB */

      .tabs {
        border-bottom: 1px solid #222;
        margin-top: 10px;
      }

      .tab {
        padding: 12px 0;
        font-weight: 600;
        width: 80px;
        text-align: center;
        position: relative;
      }

      .tab.active::after {
        content: "";
        position: absolute;
        bottom: -1px;
        left: 0;
        width: 100%;
        height: 3px;
        background: #1d9bf0;
      }

      /* POST LIST */

      .post {
        border-bottom: 1px solid #222;
        padding: 18px 0;
        display: flex;
        gap: 12px;
      }

      .post-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
      }

      .post-body {
        flex: 1;
      }

      .post-header {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .post-name {
        font-weight: 600;
      }

      .post-time {
        color: #888;
        font-size: 12px;
      }

      .post-content {
        margin-top: 6px;
        font-size: 15px;
        line-height: 1.4;
      }

      /* HASHTAGS */

      .hashtag {
        color: #1d9bf0;
        cursor: pointer;
      }

      .hashtag:hover {
        text-decoration: underline;
      }

      /* POST ACTIONS */
      .post-actions {
        display: flex;
        align-items: center;
        cursor: pointer;
        gap: 20px;
        margin-top: 10px;
        font-size: 14px;
        color: #aaa;
      }

      /* LIKE BUTTON */
      .like-btn {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 6px;
        cursor: pointer;
      }

      .like-btn svg {
        width: 20px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        align-self: center;
        justify-self: center;
        /* background-color: #1d9bf0; */
      }

      .like-count {
        font-size: 15px;
        display: flex;
        align-items: center;
        align-self: flex-end;
        justify-self: flex-end;
        line-height: 2;
      }

      /* MODAL */

      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        display: none;
        justify-content: center;
        align-items: center;
      }

      .modal-box {
        background: #111;
        padding: 20px;
        border-radius: 10px;
        width: 320px;
      }

      .modal-box input {
        width: 100%;
        padding: 8px;
        margin-top: 10px;
        background: black;
        border: 1px solid #333;
        color: white;
        border-radius: 6px;
      }

      .modal-buttons {
        margin-top: 15px;
        text-align: right;
      }

      .modal-buttons button {
        margin-left: 8px;
        padding: 6px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      .saveBtn {
        background: #1d9bf0;
        color: white;
      }

      .cancelBtn {
        background: #444;
        color: white;
      }

      /* =========================
   TABLET RESPONSIVE
========================= */

      @media (max-width: 900px) {
        .profile-header {
          gap: 25px;
          padding: 30px 0;
        }

        .profile-img {
          width: 100px;
          height: 100px;
        }

        .username {
          font-size: 22px;
        }

        .fullname {
          font-size: 14px;
        }

        .stats {
          font-size: 14px;
        }

        .btn {
          padding: 7px 14px;
          font-size: 14px;
        }
      }

      /* =========================
   MOBILE RESPONSIVE
========================= */

      @media (max-width: 600px) {
        .profile-header {
          gap: 15px;
        }

        .profile-img {
          width: 80px;
          height: 80px;
          align-self: flex-start;
        }

        .username {
          font-size: 20px;
        }

        .fullname {
          font-size: 13px;
        }

        .stats {
          font-size: 13px;
        }

        .buttons {
          width: 100%;
        }

        .btn {
          flex: 1;
          font-size: 13px;
          padding: 7px;
        }

        .post {
          gap: 10px;
          padding: 14px 0;
        }

        .post-avatar {
          width: 35px;
          height: 35px;
        }

        .post-content {
          font-size: 14px;
        }

        .post-actions {
          font-size: 13px;
          gap: 15px;
        }

        ::-webkit-scrollbar {
          display: none;
        }
      }

      /* =========================
   SMALL PHONE
========================= */

      @media (max-width: 400px) {
        .profile-img {
          width: 70px;
          height: 70px;
        }

        .username {
          font-size: 18px;
        }

        .post-content {
          font-size: 13px;
        }
      }
    </style>
  </head>

  <body>
    <div class="page">
      <div class="profile">
        <div class="profile-header">
          <img id="profilePhoto" class="profile-img" />

          <div class="profile-info">
            <div class="username" id="username"></div>
            <div class="fullname" id="fullname"></div>

            <div class="stats"><span id="postCount">0</span> posts</div>

            <div class="buttons">
              <button class="btn" onclick="openEdit()">Edit Profile</button>
              <button class="btn" onclick="logout()">Logout</button>
            </div>
          </div>
        </div>

        <div class="tabs">
          <div class="tab active">Posts</div>
        </div>

        <div id="posts"></div>
      </div>
    </div>

    <!-- EDIT PROFILE -->

    <div class="modal" id="editModal">
      <div class="modal-box">
        <h3>Edit Profile</h3>

        <input id="editName" placeholder="Name" />
        <input id="editPhoto" placeholder="Photo URL" />

        <div class="modal-buttons">
          <button class="cancelBtn" onclick="closeEdit()">Cancel</button>
          <button class="saveBtn" onclick="saveProfile()">Save</button>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

      import {
        getFirestore,
        collection,
        onSnapshot,
        doc,
        updateDoc,
        getDocs,
        query,
        where,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyA903l33klB5qT-RXX9l2Oyp7wTrd4IcRw",
        authDomain: "safezone-39f81.firebaseapp.com",
        projectId: "safezone-39f81",
        storageBucket: "safezone-39f81.firebasestorage.app",
        messagingSenderId: "685121648409",
        appId: "1:685121648409:web:d0100443175d5208bdf788",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      /* USER */

      let user = JSON.parse(localStorage.getItem("safezoneUser"));

      if (!user) {
        window.location.href = "login&Signup.html";
      }

      document.getElementById("username").innerText = user.name;
      document.getElementById("fullname").innerText = user.email;
      const profileImg = document.getElementById("profilePhoto");

profileImg.src = user.photo ? user.photo : "profile2.jpeg";

      const postsDiv = document.getElementById("posts");

      let posts = [];
      let filterTag = null;

      /* LIKE ICONS */

      const heartOutline = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-heart"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.572" /></svg>`;
      const heartFilled = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#ff2d55" stroke="#F91880" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-solid icon-tabler-heart"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.572" /></svg>`;

      /* DATE FORMAT */

      function formatDate(date) {
        if (date && date.toDate) date = date.toDate();

        const d = new Date(date);

        return (
          d.toLocaleDateString("en-GB", {
            day: "numeric",
            month: "short",
            year: "numeric",
          }) +
          " • " +
          d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
        );
      }

      /* HASHTAGS */

      function renderHashtags(text) {
        return text.replace(/#\w+/g, (tag) => {
          return `<span class="hashtag" onclick="filterTag('${tag}')">${tag}</span>`;
        });
      }

      window.filterTag = function (tag) {
        filterTag = tag;
        renderPosts();
      };

      /* SHARE */

      window.sharePost = function (p) {
        let text = `Posted by :- ${p.username}

${p.content}

Platform :- SafeZone`;

        navigator.clipboard.writeText(text);

        alert("Post copied to clipboard");
      };

      /* LIKE */

      window.likePost = async function (id, likes, likedBy) {
        const ref = doc(db, "posts", id);

        if (likedBy.includes(user.email)) {
          await updateDoc(ref, {
            likes: likes - 1,
            likedBy: likedBy.filter((e) => e !== user.email),
          });
        } else {
          likedBy.push(user.email);

          await updateDoc(ref, {
            likes: likes + 1,
            likedBy: likedBy,
          });
        }
      };

      /* LOAD POSTS */

      onSnapshot(collection(db, "posts"), (snapshot) => {
        posts = [];

        snapshot.forEach((d) => {
          posts.push({ id: d.id, ...d.data() });
        });

        renderPosts();
      });

      function renderPosts() {
        postsDiv.innerHTML = "";

        let count = 0;

        posts.forEach((p) => {
          if (p.email === user.email) {
            if (filterTag && !p.content.includes(filterTag)) return;

            count++;

            postsDiv.innerHTML += `

<div class="post">

<img src="${p.photo ? p.photo : "profile2.jpeg"}" class="post-avatar">

<div class="post-body">

<div class="post-header">

<span class="post-name">${p.username}</span>

<span class="post-time">${formatDate(p.date)}</span>

</div>

<div class="post-content">
${renderHashtags(p.content)}
</div>

<div class="post-actions">

<div class="like-btn ${(p.likedBy || []).includes(user.email) ? "liked" : ""}"
onclick='likePost("${p.id}",${p.likes || 0},${JSON.stringify(p.likedBy || [])})'>

${(p.likedBy || []).includes(user.email) ? heartFilled : heartOutline}
<span class="like-count">${p.likes || 0}</span>

</div>

<span onclick='sharePost(${JSON.stringify(p)})'>
🔗 Share
</span>

</div>

</div>

</div>

`;
          }
        });

        document.getElementById("postCount").innerText = count;
      }

      /* PROFILE EDIT */

      window.openEdit = function () {
        document.getElementById("editModal").style.display = "flex";
        document.getElementById("editName").value = user.name;
        document.getElementById("editPhoto").value = user.photo;
      };

      window.closeEdit = function () {
        document.getElementById("editModal").style.display = "none";
      };

      window.saveProfile = async function () {
        let newName = document.getElementById("editName").value;
        let newPhoto =
          document.getElementById("editPhoto").value || "profile2.jpeg";

        user.name = newName;
        user.photo = newPhoto;

        localStorage.setItem("safezoneUser", JSON.stringify(user));
        window.parent.postMessage("profileUpdated", "*");

        /* UPDATE ALL USER POSTS */

        const q = query(
          collection(db, "posts"),
          where("email", "==", user.email),
        );
        const snapshot = await getDocs(q);

        snapshot.forEach(async (postDoc) => {
          await updateDoc(doc(db, "posts", postDoc.id), {
            username: newName,
            photo: newPhoto,
          });
        });

        location.reload();
      };

      window.logout = function () {
        localStorage.removeItem("safezoneUser");

        window.location.href = "login&Signup.html";
      };
    </script>
  </body>
</html>
