<!doctype html>
<html lang="en">
  <head>

    <title>SafeZone: Cyber Security</title>

  <body>

      <div class="menu">

            stroke-linejoin="round"

            <path stroke="none" d="M0 0h24v24H0z" fill="none" />

            />
            <path d="M8 8l4 0" />
            <path d="M8 12l4 0" />
            <path d="M8 16l4 0" />
          </svg>
          News
        </a>

        <!-- POST -->
        <a class="navlink" onclick="loadPage('post.html')">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon icon-tabler icons-tabler-outline icon-tabler-library-plus"
          >
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <path
              d="M7 5.667a2.667 2.667 0 0 1 2.667 -2.667h8.666a2.667 2.667 0 0 1 2.667 2.667v8.666a2.667 2.667 0 0 1 -2.667 2.667h-8.666a2.667 2.667 0 0 1 -2.667 -2.667l0 -8.666"
            />
            <path
              d="M4.012 7.26a2.005 2.005 0 0 0 -1.012 1.737v10c0 1.1 .9 2 2 2h10c.75 0 1.158 -.385 1.5 -1"
            />
            <path d="M11 10h6" />
            <path d="M14 7v6" />
          </svg>
          Post
        </a>

        <!-- CONTACT -->
        <a class="navlink" onclick="loadPage('login&Signup.html')">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon icon-tabler icons-tabler-outline icon-tabler-phone"
          >
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <path
              d="M5 4h4l2 5l-2.5 1.5a11 11 0 0 0 5 5l1.5 -2.5l5 2v4a2 2 0 0 1 -2 2a16 16 0 0 1 -15 -15a2 2 0 0 1 2 -2"
            />
          </svg>
          Contacts
        </a>

        <!-- PROFILE -->
        <div class="profile-container">
          <img src="profile1.jpeg" class="profile-pic" onclick="toggleProfileMenu()"/>

          <div class="profile-dropdown" id="profileDropdown">
            <a onclick="loadPage('profile.html')">👤 Profile</a>
            <a onclick="loadPage('settings.html')">⚙ Settings</a>
            <a onclick="logout()">🚪 Logout</a>
          </div>
        </div>
      </div>
    </nav>

    <!-- CONTENT -->
    <div class="content">
      <iframe id="frame" src="home.html"></iframe>
    </div>

    <!-- MOBILE BOTTOM BAR -->

    <div class="mobile-bar">
      <div class="mobile-item" onclick="loadPage('home.html')">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-home"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M5 12l-2 0l9 -9l9 9l-2 0" /><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7" /><path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6" /></svg>
        <span>Home</span>
      </div>

      <div class="mobile-item" onclick="loadPage('news.html')">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-news"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M16 6h3a1 1 0 0 1 1 1v11a2 2 0 0 1 -4 0v-13a1 1 0 0 0 -1 -1h-10a1 1 0 0 0 -1 1v12a3 3 0 0 0 3 3h11" /><path d="M8 8l4 0" /><path d="M8 12l4 0" /><path d="M8 16l4 0" /></svg>
        <span>News</span>
      </div>

      <div class="mobile-item" onclick="loadPage('post.html')">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-library-plus"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M7 5.667a2.667 2.667 0 0 1 2.667 -2.667h8.666a2.667 2.667 0 0 1 2.667 2.667v8.666a2.667 2.667 0 0 1 -2.667 2.667h-8.666a2.667 2.667 0 0 1 -2.667 -2.667l0 -8.666" /><path d="M4.012 7.26a2.005 2.005 0 0 0 -1.012 1.737v10c0 1.1 .9 2 2 2h10c.75 0 1.158 -.385 1.5 -1" /><path d="M11 10h6" /><path d="M14 7v6" /></svg>
        <span>Post</span>
      </div>

      <div class="mobile-item" onclick="goHome()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-phone"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M5 4h4l2 5l-2.5 1.5a11 11 0 0 0 5 5l1.5 -2.5l5 2v4a2 2 0 0 1 -2 2a16 16 0 0 1 -15 -15a2 2 0 0 1 2 -2" /></svg>
        <span>Contact</span>
      </div>

      <div class="mobile-item" onclick="loadPage('profile.html')">
        <img src="profile1.jpeg" class="mobile-profile" />

        <span>Profile</span>
      </div>
    </div>

    <script>
      /* Load saved page */

      window.onload = function () {
        let savedPage = localStorage.getItem("currentPage");

        if (savedPage) {
          document.getElementById("frame").src = savedPage;
        } else {
          document.getElementById("frame").src = "home.html";
        }
      };

      /* LOAD PAGE */

      function loadPage(page) {
        document.getElementById("frame").src = page;

        localStorage.setItem("currentPage", page);
      }

      /* HOME */

      function goHome() {
        document.getElementById("frame").src = "home.html";

        localStorage.setItem("currentPage", "home.html");
      }

      /* PROFILE DROPDOWN */

      function toggleProfileMenu() {
        let menu = document.getElementById("profileDropdown");

        if (menu.style.display === "flex") {
          menu.style.display = "none";
        } else {
          menu.style.display = "flex";
        }
      }

      /* CLOSE DROPDOWN */

      window.addEventListener("click", function (e) {
        if (!e.target.matches(".profile-pic")) {
          let dropdown = document.getElementById("profileDropdown");

          if (dropdown) dropdown.style.display = "none";
        }
      });

      function logout() {
        alert("Logged out");
      }
    </script>
  </body>
</html>
