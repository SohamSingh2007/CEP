<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafeZone: Cyber Security</title>
    <link rel="shortcut icon" href="logo.svg" type="image/x-icon">

    <style>
      /* RESET */

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        overflow: hidden;
      }

      /* NAVBAR */

      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 4%;
        border-bottom: 1px solid #ddd;
        background: white;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 100;
      }

      /* LOGO */

      .logo {
        font-size: 22px;
        font-weight: bold;
        color: #2b4eff;
        cursor: pointer;
      }

      /* MENU */

      .menu {
        display: flex;
        align-items: center;
      }

      .menu a,
      .theme-btn {
        margin-left: 25px;

        color: #333;

        display: flex;

        align-items: center;

        gap: 6px;

        cursor: pointer;

        padding: 10px;

        border-radius: 10px;

        text-decoration: none;

        transition: 0.3s;

        border: none;
        background: none;

        font-size: 14px;
      }

      .menu a:hover,
      .theme-btn:hover {
        background: #2b4eff;
        color: white;
      }

      /* ACTIVE */

      .menu a.active {
        background: #2b4eff;
        color: white;
      }

      /* CONTENT */

      .content {
        position: absolute;
        top: 71px;
        left: 0;
        width: 100%;
        height: calc(100vh - 71px);
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      /* DARK MODE */

      .dark {
        background: #111;
        color: white;
      }

      .dark nav {
        background: #222;
        border-bottom: 1px solid #444;
      }

      .dark .menu a,
      .dark .theme-btn {
        color: white;
      }

      /* MOBILE */

      @media (max-width: 768px) {
        .menu {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->

    <nav>
      <!-- LOGO -->

      <div class="logo" onclick="goHome()">
        <span style="color: #333">Safe</span>Zone
      </div>

      <div class="menu">
        <!-- NEWS -->

        <a class="navlink" onclick="loadPage('news.html')">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon icon-tabler icons-tabler-outline icon-tabler-news"
          >
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <path
              d="M16 6h3a1 1 0 0 1 1 1v11a2 2 0 0 1 -4 0v-13a1 1 0 0 0 -1 -1h-10a1 1 0 0 0 -1 1v12a3 3 0 0 0 3 3h11"
            />
            <path d="M8 8l4 0" />
            <path d="M8 12l4 0" />
            <path d="M8 16l4 0" />
          </svg>

          News
        </a>

        <!-- POST -->

        <a class="navlink" onclick="loadPage('post.html')">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon icon-tabler icons-tabler-outline icon-tabler-library-plus"
          >
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <path
              d="M7 5.667a2.667 2.667 0 0 1 2.667 -2.667h8.666a2.667 2.667 0 0 1 2.667 2.667v8.666a2.667 2.667 0 0 1 -2.667 2.667h-8.666a2.667 2.667 0 0 1 -2.667 -2.667l0 -8.666"
            />
            <path
              d="M4.012 7.26a2.005 2.005 0 0 0 -1.012 1.737v10c0 1.1 .9 2 2 2h10c.75 0 1.158 -.385 1.5 -1"
            />
            <path d="M11 10h6" />
            <path d="M14 7v6" />
          </svg>

          Post
        </a>

        <!-- CONTACT -->

        <a class="navlink" onclick="loadPage('contacts.html')">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon icon-tabler icons-tabler-outline icon-tabler-phone"
          >
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <path
              d="M5 4h4l2 5l-2.5 1.5a11 11 0 0 0 5 5l1.5 -2.5l5 2v4a2 2 0 0 1 -2 2a16 16 0 0 1 -15 -15a2 2 0 0 1 2 -2"
            />
          </svg>

          Contacts
        </a>

        <!-- DARK MODE BUTTON -->

        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">
          <!-- Moon Icon -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            id="moonIcon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon icon-tabler icons-tabler-outline icon-tabler-moon"
          >
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <path
              d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454l0 .008"
            />
          </svg>

          <!-- Sun Icon -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            id="sunIcon"
            style="display: none"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon icon-tabler icons-tabler-outline icon-tabler-sun"
          >
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <path d="M8 12a4 4 0 1 0 8 0a4 4 0 1 0 -8 0" />
            <path
              d="M3 12h1m8 -9v1m8 8h1m-9 8v1m-6.4 -15.4l.7 .7m12.1 -.7l-.7 .7m0 11.4l.7 .7m-12.1 -.7l-.7 .7"
            />
          </svg>
        </button>
      </div>
    </nav>

    <!-- CONTENT -->

    <div class="content">
      <iframe id="frame" src="news.html"></iframe>
    </div>

    <script>
      /* LOAD PAGE */

      function loadPage(page) {
        document.getElementById("frame").src = page;

        /* Remove active */

        document.querySelectorAll(".navlink").forEach((link) => {
          link.classList.remove("active");
        });

        /* Add active */

        event.currentTarget.classList.add("active");
      }

      /* HOME */

      function goHome() {
        document.getElementById("frame").src = "home.html";

        document.querySelectorAll(".navlink").forEach((link) => {
          link.classList.remove("active");
        });
      }

      /* DARK LIGHT SWITCH */

      function toggleTheme() {
        document.body.classList.toggle("dark");

        let moon = document.getElementById("moonIcon");
        let sun = document.getElementById("sunIcon");

        if (document.body.classList.contains("dark")) {
          moon.style.display = "none";
          sun.style.display = "block";
        } else {
          moon.style.display = "block";
          sun.style.display = "none";
        }
      }
    </script>
  </body>
</html>
