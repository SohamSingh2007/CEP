<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafeZone - Login / Signup</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: #000;
        color: #fff;
        display: flex;
        min-height: 100vh;
      }

      /* LEFT SIDE */

      .left {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      .left img {
        width: 220px;
        margin-bottom: 10px;
      }

      .left p {
        font-size: 28px;
        font-weight: 700;
      }

      /* RIGHT SIDE */

      .right {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px;
      }

      .container {
        width: 100%;
        max-width: 420px;
      }

      .container h2 {
        font-size: 42px;
        margin-bottom: 20px;
      }

      .container p {
        font-size: 18px;
        color: #aaa;
        margin-bottom: 30px;
      }

      /* Buttons */

      .btn {
        width: 100%;
        padding: 14px;
        border-radius: 30px;
        border: none;
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 15px;
        cursor: pointer;
        transition: 0.3s;
      }

      .google {
        background: #fff;
        color: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      .google:hover {
        background: #ddd;
      }

      .google-icon {
        width: 20px;
        height: 20px;
      }

      .create {
        background: #4176e8;
        color: #fff;
      }

      .create:hover {
        background: #3a5fb8;
      }

      /* Divider */

      .divider {
        text-align: center;
        margin: 15px 0;
        color: #888;
        position: relative;
      }

      .divider::before,
      .divider::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 40%;
        height: 1px;
        background: #333;
      }

      .divider::before {
        left: 0;
      }

      .divider::after {
        right: 0;
      }

      /* Forms */

      form {
        display: none;
        margin-top: 20px;
      }

      form input {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: 1px solid #333;
        background: #111;
        color: #fff;
      }

      form button {
        width: 100%;
        padding: 12px;
        border-radius: 25px;
        border: none;
        background: #fff;
        font-weight: 600;
        cursor: pointer;
      }

      .toggle {
        margin-top: 10px;
        text-align: center;
        color: #aaa;
        cursor: pointer;
        font-size: 14px;
      }

      /* Mobile */

      @media (max-width: 900px) {
        body {
          flex-direction: column;
        }

        .left {
          padding-top: 40px;
        }

        .left img {
          width: 120px;
        }

        .left p {
          font-size: 20px;
        }

        .right {
          padding: 40px 25px;
        }

        .container h2 {
          font-size: 8vw;
        }

        .container p {
          font-size: 5vw;
        }
      }
    </style>
  </head>

  <body>
    <div class="left">
      <img src="icon2.svg" />
      <p>safe<span style="color: #4176e8">Zone</span></p>
    </div>

    <div class="right">
      <div class="container">
        <h2>See what's happened in cyber world.</h2>
        <p>Join SafeZone today.</p>

        <button class="btn google" id="googleLogin">
          <img src="google.svg" class="google-icon" />
          Continue with Google
        </button>

        <div class="divider">OR</div>

        <button class="btn create" onclick="showSignup()">
          Create account
        </button>

        <!-- SIGNUP -->

        <form id="signupForm">
          <input id="signupName" type="text" placeholder="Full Name" />

          <input id="signupEmail" type="email" placeholder="Email" />

          <input id="signupPassword" type="password" placeholder="Password" />

          <button type="submit">Sign Up</button>

          <div class="toggle" onclick="showLogin()">
            Already have an account?
            <span style="color: #5f92ff; font-weight: 700">Sign in</span>
          </div>
        </form>

        <!-- LOGIN -->

        <form id="loginForm">
          <input id="loginEmail" type="email" placeholder="Email" />

          <input id="loginPassword" type="password" placeholder="Password" />

          <button type="submit">Login</button>

          <div class="toggle" onclick="resetPassword()">Forgot password?</div>

          <div class="toggle" onclick="showSignup()">
            Don't have an account?
            <span style="color: #5f92ff; font-weight: 700">Create one</span>
          </div>
        </form>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

      import {
        getAuth,
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        GoogleAuthProvider,
        signInWithPopup,
        sendPasswordResetEmail,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyA903l33klB5qT-RXX9l2Oyp7wTrd4IcRw",
        authDomain: "safezone-39f81.firebaseapp.com",
        projectId: "safezone-39f81",
        storageBucket: "safezone-39f81.firebasestorage.app",
        messagingSenderId: "685121648409",
        appId: "1:685121648409:web:d0100443175d5208bdf788"
      };

      const app = initializeApp(firebaseConfig);

      const auth = getAuth(app);

      const provider = new GoogleAuthProvider();

      /* UI TOGGLE */

      window.showSignup = function () {
        document.getElementById("signupForm").style.display = "block";

        document.getElementById("loginForm").style.display = "none";
      };

      window.showLogin = function () {
        document.getElementById("loginForm").style.display = "block";

        document.getElementById("signupForm").style.display = "none";
      };

      /* SIGNUP */

      document.getElementById("signupForm").addEventListener("submit", (e) => {
        e.preventDefault();

        const email = document.getElementById("signupEmail").value;

        const password = document.getElementById("signupPassword").value;

        createUserWithEmailAndPassword(auth, email, password)
          .then(() => {
            alert("Account Created Successfully");

            window.location.href = "index.html";
          })

          .catch((error) => {
            alert(error.message);
          });
      });

      /* LOGIN */

      document.getElementById("loginForm").addEventListener("submit", (e) => {
        e.preventDefault();

        const email = document.getElementById("loginEmail").value;

        const password = document.getElementById("loginPassword").value;

        signInWithEmailAndPassword(auth, email, password)
          .then(() => {
            alert("Login Successful");

            window.location.href = "index.html";
          })

          .catch((error) => {
            alert(error.message);
          });
      });

      /* GOOGLE LOGIN */

      document.getElementById("googleLogin").addEventListener("click", () => {
        signInWithPopup(auth, provider)
          .then(() => {
            alert("Google Login Successful");

            window.location.href = "index.html";
          })

          .catch((error) => {
            alert(error.message);
          });
      });

      /* RESET PASSWORD */

      window.resetPassword = function () {
        const email = document.getElementById("loginEmail").value;

        if (email === "") {
          alert("Enter your email first");

          return;
        }

        sendPasswordResetEmail(auth, email)
          .then(() => {
            alert("Password reset email sent");
          })

          .catch((error) => {
            alert(error.message);
          });
      };
    </script>
  </body>
</html>
