<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafeZone - Login / Signup</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: linear-gradient(180deg, #000000, #07123b);
        color: #fff;
        display: flex;
        min-height: 100vh;
      }

      /* LEFT SIDE */

      .left {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      .left img {
        width: 220px;
        margin-bottom: 10px;
      }

      .left p {
        font-size: 28px;
        font-weight: 700;
      }

      /* RIGHT SIDE */

      .right {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px;
      }

      .container {
        width: 100%;
        max-width: 420px;
      }

      .container h2 {
        font-size: 42px;
        margin-bottom: 20px;
      }

      .container p {
        font-size: 18px;
        color: #aaa;
        margin-bottom: 30px;
      }

      /* Buttons */

      .btn {
        width: 100%;
        padding: 14px;
        border-radius: 30px;
        border: none;
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 15px;
        cursor: pointer;
        transition: 0.3s;
      }

      .google {
        background: #fff;
        color: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      .google:hover {
        background: #ddd;
      }

      .google-icon {
        width: 20px;
        height: 20px;
      }

      .create {
        background: #4176e8;
        color: #fff;
      }

      .create:hover {
        background: #3a5fb8;
      }

      /* Divider */

      .divider {
        text-align: center;
        margin: 15px 0;
        color: #888;
        position: relative;
      }

      .divider::before,
      .divider::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 40%;
        height: 1px;
        background: #333;
      }

      .divider::before {
        left: 0;
      }

      .divider::after {
        right: 0;
      }

      /* Forms */

      form {
        display: none;
        margin-top: 20px;
      }

      form input {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: 1px solid #333;
        background: #11111100;
        color: #fff;
      }

      form button {
        width: 100%;
        padding: 12px;
        border-radius: 25px;
        border: none;
        background: #fff;
        font-weight: 600;
        cursor: pointer;
      }

      .toggle {
        margin-top: 10px;
        text-align: center;
        color: #aaa;
        cursor: pointer;
        font-size: 14px;
      }

      /* SCROLLBAR */
      ::-webkit-scrollbar {
        width: 5px;
      }

      ::-webkit-scrollbar-track {
        background: #020617;
      }

      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #03265b);
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #0d50a1);
      }

      #toast {
        position: fixed;
        top: 30px;
        right: 30px;
        min-width: 250px;
        max-width: 320px;
        padding: 14px 18px;
        border-radius: 8px;
        color: white;
        font-size: 14px;
        font-weight: 500;
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.3s ease;
        z-index: 9999;
      }

      #toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      .toast-success {
        background: #22c55e;
      }

      .toast-error {
        background: #ef4444;
      }

      .toast-info {
        background: #3b82f6;
      }

      /* password toggle */
      .password-box {
        position: relative;
      }

      .password-box input {
        width: 100%;
        padding-right: 40px;
      }

      .toggle-eye {
        height: max-content;
        position: absolute;
        right: 12px;
        top: 42%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #aaa;
      }

      .toggle-eye svg {
        pointer-events: none;
        align-self: center;
        justify-self: center;
      }

      /* Mobile */

      @media (max-width: 900px) {
        body {
          flex-direction: column;
        }

        .left {
          padding-top: 40px;
        }

        .left img {
          width: 120px;
        }

        .left p {
          font-size: 20px;
        }

        .right {
          padding: 40px 25px;
        }

        .container h2 {
          font-size: 8vw;
        }

        .container p {
          font-size: 5vw;
        }
      }
    </style>
  </head>

  <body>
    <div class="left">
      <img src="icon2.svg" />
      <p>safe<span style="color: #4176e8">Zone</span></p>
    </div>

    <div class="right">
      <div class="container">
        <h2>See what's happened in cyber world.</h2>
        <p>Join SafeZone today.</p>

        <button class="btn google" id="googleLogin">
          <img src="google.svg" class="google-icon" />
          Continue with Google
        </button>

        <div class="divider">OR</div>

        <button class="btn create" onclick="showSignup()">
          Create account
        </button>

        <!-- SIGNUP -->

        <form id="signupForm">
          <input id="signupName" type="text" placeholder="Full Name" />

          <input id="signupEmail" type="email" placeholder="Email" />

          <div class="password-box">
            <input id="signupPassword" type="password" placeholder="Password" />

            <span
              class="toggle-eye"
              onclick="togglePassword('signupPassword', this)"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="eye-open icon icon-tabler icons-tabler-outline icon-tabler-eye"
              >
                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                <path d="M10 12a2 2 0 1 0 4 0a2 2 0 0 0 -4 0" />
                <path
                  d="M21 12c-2.4 4 -5.4 6 -9 6c-3.6 0 -6.6 -2 -9 -6c2.4 -4 5.4 -6 9 -6c3.6 0 6.6 2 9 6"
                />
              </svg>

              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="eye-off icon icon-tabler icons-tabler-outline icon-tabler-eye-off"
                style="display: none"
              >
                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                <path d="M10.585 10.587a2 2 0 0 0 2.829 2.828" />
                <path
                  d="M16.681 16.673a8.717 8.717 0 0 1 -4.681 1.327c-3.6 0 -6.6 -2 -9 -6c1.272 -2.12 2.712 -3.678 4.32 -4.674m2.86 -1.146a9.055 9.055 0 0 1 1.82 -.18c3.6 0 6.6 2 9 6c-.666 1.11 -1.379 2.067 -2.138 2.87"
                />
                <path d="M3 3l18 18" />
              </svg>
            </span>
          </div>

          <button type="submit">Sign Up</button>

          <div class="toggle" onclick="showLogin()">
            Already have an account?
            <span style="color: #5f92ff; font-weight: 700">Sign in</span>
          </div>
        </form>

        <!-- LOGIN -->

        <form id="loginForm">
          <input id="loginEmail" type="email" placeholder="Email" />

          <div class="password-box">
            <input id="loginPassword" type="password" placeholder="Password" />

            <span
              class="toggle-eye"
              onclick="togglePassword('loginPassword', this)"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="eye-open icon icon-tabler icons-tabler-outline icon-tabler-eye"
              >
                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                <path d="M10 12a2 2 0 1 0 4 0a2 2 0 0 0 -4 0" />
                <path
                  d="M21 12c-2.4 4 -5.4 6 -9 6c-3.6 0 -6.6 -2 -9 -6c2.4 -4 5.4 -6 9 -6c3.6 0 6.6 2 9 6"
                />
              </svg>

              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="eye-off icon icon-tabler icons-tabler-outline icon-tabler-eye-off"
                style="display: none"
              >
                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                <path d="M10.585 10.587a2 2 0 0 0 2.829 2.828" />
                <path
                  d="M16.681 16.673a8.717 8.717 0 0 1 -4.681 1.327c-3.6 0 -6.6 -2 -9 -6c1.272 -2.12 2.712 -3.678 4.32 -4.674m2.86 -1.146a9.055 9.055 0 0 1 1.82 -.18c3.6 0 6.6 2 9 6c-.666 1.11 -1.379 2.067 -2.138 2.87"
                />
                <path d="M3 3l18 18" />
              </svg>
            </span>
          </div>

          <button type="submit">Login</button>

          <div class="toggle" onclick="resetPassword()">Forgot password?</div>

          <div class="toggle" onclick="showSignup()">
            Don't have an account?
            <span style="color: #5f92ff; font-weight: 700">Create one</span>
          </div>
        </form>
      </div>
    </div>
    <div id="toast"></div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

      import {
        getAuth,
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        GoogleAuthProvider,
        signInWithPopup,
        sendPasswordResetEmail,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

      import {
        getFirestore,
        doc,
        getDoc,
        setDoc,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyA903l33klB5qT-RXX9l2Oyp7wTrd4IcRw",
        authDomain: "safezone-39f81.firebaseapp.com",
        projectId: "safezone-39f81",
        storageBucket: "safezone-39f81.firebasestorage.app",
        messagingSenderId: "685121648409",
        appId: "1:685121648409:web:d0100443175d5208bdf788",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const provider = new GoogleAuthProvider();

      /* UI TOGGLE */

      window.showSignup = function () {
        document.getElementById("signupForm").style.display = "block";
        document.getElementById("loginForm").style.display = "none";
      };

      window.showLogin = function () {
        document.getElementById("loginForm").style.display = "block";
        document.getElementById("signupForm").style.display = "none";
      };

      /* SIGNUP */

      document
        .getElementById("signupForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const name = signupName.value.trim();
          const email = signupEmail.value.trim();
          const password = signupPassword.value.trim();

          if (!name || !email || !password) {
            showToast("Fill all fields", "error");
            return;
          }

          try {
            const userCredential = await createUserWithEmailAndPassword(
              auth,
              email,
              password,
            );
            const user = userCredential.user;

            const photoURL = "profile2.jpeg";

            await setDoc(doc(db, "users", user.email), {
              name: name,
              email: user.email,
              photo: photoURL,
            });

            localStorage.setItem(
              "safezoneUser",
              JSON.stringify({
                name: name,
                email: user.email,
                photo: photoURL,
              }),
            );

            showToast("Account created", "success");

            setTimeout(() => {
              window.location.replace("profile.html");
            }, 1200);
          } catch (error) {
            showToast(error.message, "error");
          }
        });

      /* LOGIN */

      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const email = loginEmail.value.trim();
          const password = loginPassword.value.trim();

          if (!email || !password) {
            showToast("Enter email and password", "error");
            return;
          }

          try {
            const userCredential = await signInWithEmailAndPassword(
              auth,
              email,
              password,
            );
            const user = userCredential.user;

            const userRef = doc(db, "users", user.email);
            const snap = await getDoc(userRef);

            let name;
            let photo;

            if (snap.exists()) {
              const data = snap.data();
              name = data.name;
              photo = data.photo;
            } else {
              name = user.displayName || user.email.split("@")[0];
              photo = user.photoURL || "profile2.jpeg";

              await setDoc(userRef, {
                name: name,
                email: user.email,
                photo: photo,
              });
            }

            localStorage.setItem(
              "safezoneUser",
              JSON.stringify({
                name: name,
                email: user.email,
                photo: photo,
              }),
            );

            showToast("Login successful", "success");

            setTimeout(() => {
              window.location.replace("profile.html");
            }, 1200);
          } catch (error) {
            showToast("Login failed", "error");
          }
        });

      /* GOOGLE LOGIN */

      googleLogin.addEventListener("click", async () => {
        try {
          const result = await signInWithPopup(auth, provider);
          const user = result.user;

          const userRef = doc(db, "users", user.email);
          const snap = await getDoc(userRef);

          let name;
          let photo;

          if (snap.exists()) {
            const data = snap.data();
            name = data.name;
            photo = data.photo;
          } else {
            name = user.displayName;
            photo = user.photoURL;

            await setDoc(userRef, {
              name: name,
              email: user.email,
              photo: photo,
            });
          }

          localStorage.setItem(
            "safezoneUser",
            JSON.stringify({
              name: name,
              email: user.email,
              photo: photo,
            }),
          );

          showToast("Signed in with Google", "success");

          window.location.replace("profile.html");
        } catch (error) {
          showToast("Google login failed", "error");
        }
      });

      /* RESET PASSWORD */

      window.resetPassword = function () {
        const email = loginEmail.value;

        if (!email) {
          showToast("Enter email first", "error");
          return;
        }

        sendPasswordResetEmail(auth, email)
          .then(() => {
            showToast("Password reset email sent", "info");
          })
          .catch(() => {
            showToast("Error sending email", "error");
          });
      };

      /* TOAST */

      function showToast(message, type = "info") {
        const toast = document.getElementById("toast");

        toast.innerText = message;
        toast.className = "";
        toast.classList.add("show", `toast-${type}`);

        setTimeout(() => {
          toast.classList.remove("show");
        }, 3000);
      }
      onSnapshot(doc(db, "users", user.email), (snap) => {
        if (snap.exists()) {
          const data = snap.data();

          document.getElementById("username").innerText = data.name;

          user.name = data.name;

          localStorage.setItem("safezoneUser", JSON.stringify(user));
        }
      });
    </script>
  </body>
</html>
