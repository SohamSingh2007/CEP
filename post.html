<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SafeZone Community</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Inter;
      }

      body {
        background: linear-gradient(180deg, #000000, #07123b);
        color: white;
        display: flex;
        justify-content: center;
      }

      .wrapper {
        width: 1200px;
        display: grid;
        grid-template-columns: 280px 1fr 350px;
      }

      .left {
        padding: 20px;
        border-right: 1px solid #222;
        position: sticky;
        top: 0;
        height: 100vh;
      }

      .profile-card {
        background: #111;
        border-radius: 18px;
        padding: 20px;
        text-align: center;
      }

      .profile-card img {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        border: 3px solid #1d9bf0;
        margin-bottom: 10px;
      }

      .stats {
        display: flex;
        justify-content: space-around;
        margin-top: 10px;
      }

      .stat span {
        font-size: 12px;
        color: #aaa;
      }

      .feed {
        border-right: 1px solid #222;
      }

      .create-post {
        padding: 15px;
        border-bottom: 1px solid #222;
      }

      .create-post textarea {
        width: 100%;
        background: transparent;
        border: none;
        color: white;
        resize: none;
        height: 70px;
        outline: none;
      }

      .create-post button {
        margin-top: 8px;
        background: #1d9bf0;
        border: none;
        padding: 8px 18px;
        border-radius: 20px;
        color: white;
        cursor: pointer;
      }

      .post {
        padding: 15px;
        border-bottom: 1px solid #222;
      }

      .post-time {
        font-size: 12px;
        color: #777;
      }

      .post-footer {
        display: flex;
        gap: 20px;
        margin-top: 10px;
        color: #aaa;
      }

      .post-action {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }

      .post-action svg {
        width: 18px;
        height: 18px;
        display: block;
      }

      .right {
        padding: 20px;
      }

      .box {
        background: #111;
        border-radius: 18px;
        padding: 15px;
        margin-bottom: 20px;
        overflow: hidden;
      }

      .box h3 {
        margin-bottom: 10px;
      }

      .my-post {
        background: #1a1a1a;
        padding: 10px;
        border-radius: 10px;
        margin-bottom: 8px;
      }

      #myPost-container {
        max-height: 300px;
        overflow-y: auto;
        margin-top: 10px;
        padding-right: 6px;
      }

      #myPost-container::-webkit-scrollbar {
        width: 4px;
      }

      #myPost-container::-webkit-scrollbar-track {
        background: #000000;
      }

      #myPost-container::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 10px;
      }

      #myPost-container::-webkit-scrollbar-button {
        display: none;
      }

      .btn {
        background: #333;
        border: none;
        color: white;
        padding: 4px 8px;
        margin-left: 5px;
        cursor: pointer;
        border-radius: 6px;
      }

      .trend {
        cursor: pointer;
        padding: 6px;
        border-radius: 6px;
      }

      .trend:hover {
        background: #222;
      }

      .hashtag {
        color: #1d9bf0;
        cursor: pointer;
        font-weight: 500;
      }

      .hashtag:hover {
        text-decoration: underline;
      }

      .logout {
        background: #ff4c4c;
        border: none;
        padding: 6px 12px;
        margin-top: 10px;
        border-radius: 10px;
        cursor: pointer;
      }

      ::-webkit-scrollbar {
        width: 5px;
      }

      ::-webkit-scrollbar-track {
        background: #020617;
      }

      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #03265b);
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #0d50a1);
      }

      #toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        padding: 12px 18px;
        border-radius: 8px;
        font-size: 14px;
        opacity: 0;
        pointer-events: none;
        transition: 0.3s;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
        z-index: 9999;
        color: white;
      }

      #toast.show {
        opacity: 1;
        bottom: 40px;
      }

      /* types */

      .toast-success {
        background: #16a34a;
      }

      .toast-error {
        background: #dc2626;
      }

      .toast-info {
        background: #2563eb;
      }

      /* delete confirmation */
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .modal-box {
        width: 400px;
        background: #111;
        padding: 20px;
        border-radius: 12px;
        border: 1px solid #333;
        animation: pop 0.25s ease;
      }

      @keyframes pop {
        from {
          transform: scale(0.9);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .modal-header h3 {
        font-size: 18px;
      }

      .closeModal {
        cursor: pointer;
        color: #aaa;
      }

      .modal-text {
        margin-top: 10px;
        font-size: 14px;
        color: #bbb;
      }

      .modal-warning {
        margin-top: 15px;
        padding: 10px;
        background: #2a1a1a;
        border-left: 4px solid #ef4444;
        color: #ffb4b4;
        font-size: 13px;
        border-radius: 6px;
      }

      .modal-buttons {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 20px;
      }

      .cancelBtn {
        background: #444;
        border: none;
        color: white;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
      }

      .deleteBtn {
        background: #ef4444;
        border: none;
        color: white;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
      }

      /* active filter */
      .active-filter {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #1d9bf0;
        padding: 6px 10px;
        border-radius: 20px;
        font-size: 13px;
        margin-bottom: 10px;
        width: fit-content;
      }

      .active-filter span {
        cursor: pointer;
        font-weight: bold;
      }

      /* Tablets */

      @media (max-width: 1000px) {
        .wrapper {
          grid-template-columns: 220px 1fr;
        }

        .right {
          grid-column: 1 / span 2;
          border-top: 1px solid #222;
        }
      }

      /* Mobile */

      @media (max-width: 700px) {
        .wrapper {
          grid-template-columns: 1fr;
          width: 100%;
        }

        .left {
          display: none;
        }

        .feed {
          border-right: none;
        }

        .right {
          display: none;
        }

        .profile-card {
          max-width: 350px;
          margin: auto;
        }

        ::-webkit-scrollbar {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <div class="left">
        <div class="profile-card">
          <img id="profilePhoto" />

          <h3 id="profileName"></h3>

          <div id="profileEmail" style="color: #aaa; font-size: 13px"></div>

          <div class="stats">
            <div class="stat">
              <div id="postCount">0</div>
              <span>Posts</span>
            </div>

            <div class="stat">
              <div id="likeCount">0</div>
              <span>Likes</span>
            </div>
          </div>

          <button class="logout" onclick="logout()">Logout</button>
        </div>
      </div>

      <div class="feed">
        <div class="create-post">
          <textarea
            id="content"
            placeholder="Share cyber incident..."
          ></textarea>

          <button onclick="addPost()">Post</button>
        </div>

        <div id="posts"></div>
      </div>

      <div class="right">
        <div class="box">
          <h3>Your Posts</h3>

          <div id="myPost-container">
            <div id="myPosts"></div>
          </div>
        </div>

        <div class="box">
          <h3>Trending</h3>

          <div id="trending"></div>
        </div>
      </div>
    </div>
    <!-- tosted message -->
    <div id="toast"></div>

    <!-- delete confirmation -->
    <div id="deleteModal" class="modal">
      <div class="modal-box">
        <div class="modal-header">
          <h3>Delete Post?</h3>
          <span class="closeModal" onclick="closeDeleteModal()">✖</span>
        </div>

        <p class="modal-text">
          Are you sure you want to delete this post? You can't undo this action.
        </p>

        <div class="modal-warning">
          ⚠ Warning This post will be permanently deleted.
        </div>

        <div class="modal-buttons">
          <button class="cancelBtn" onclick="closeDeleteModal()">Cancel</button>
          <button class="deleteBtn" id="confirmDelete">Delete Post</button>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

      import {
        getFirestore,
        collection,
        addDoc,
        onSnapshot,
        doc,
        updateDoc,
        deleteDoc,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyA903l33klB5qT-RXX9l2Oyp7wTrd4IcRw",
        authDomain: "safezone-39f81.firebaseapp.com",
        projectId: "safezone-39f81",
        storageBucket: "safezone-39f81.firebasestorage.app",
        messagingSenderId: "685121648409",
        appId: "1:685121648409:web:d0100443175d5208bdf788",
      };

      const app = initializeApp(firebaseConfig);

      const db = getFirestore(app);

      /* USER CHECK */

      const user = JSON.parse(localStorage.getItem("safezoneUser"));

      if (!user) {
        window.location.href = "login&Signup.html";
      }

      const username = user.name;
      const email = user.email;
      const photo = user.photo;

      /* PROFILE UI */

      document.getElementById("profileName").innerText = username;
      document.getElementById("profileEmail").innerText = email;
      document.getElementById("profilePhoto").src = photo;

      /* POSTS */

      let posts = [];
      let filterTag = null;

      function formatDate(date) {
        if (date && date.toDate) {
          date = date.toDate();
        }

        const d = new Date(date);

        return (
          d.toLocaleDateString("en-GB", {
            day: "numeric",
            month: "short",
            year: "numeric",
          }) +
          " • " +
          d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
        );
      }

      function extractTags(text) {
        return text.match(/#\w+/g) || [];
      }

      window.addPost = async function () {
        let content = document.getElementById("content").value.trim();

        if (!content) {
          showToast("Write something", "error");
          return;
        }

        await addDoc(collection(db, "posts"), {
          username,
          email,
          photo,
          content,
          date: new Date(),
          likes: 0,
          likedBy: [],
        });

        document.getElementById("content").value = "";
        showToast("Post created successfully", "success");
      };

      window.likePost = async function (id, likes, likedBy) {
        const ref = doc(db, "posts", id);

        if (likedBy.includes(email)) {
          await updateDoc(ref, {
            likes: likes - 1,
            likedBy: likedBy.filter((e) => e !== email),
          });
        } else {
          likedBy.push(email);

          await updateDoc(ref, {
            likes: likes + 1,
            likedBy: likedBy,
          });
        }
      };

      window.deletePost = async function (id) {
        await deleteDoc(doc(db, "posts", id));
        showToast("Post deleted successfully", "info");
      };

      window.editPost = async function (id) {
        const post = posts.find((p) => p.id === id);

        let newText = prompt("Edit post", post.content);

        if (!newText) return;

        await updateDoc(doc(db, "posts", id), {
          content: newText,
        });
      };

      window.sharePost = function (p) {
        let date = p.date;

        // Firestore Timestamp → Date
        if (date && typeof date === "object" && date.toDate) {
          date = date.toDate();
        }

        // String → Date
        if (typeof date === "string") {
          date = new Date(date);
        }

        // Fallback if still invalid
        if (!date || isNaN(new Date(date))) {
          date = new Date();
        }

        let text = `Posted by :- ${p.username}
Date :- ${formatDate(date)}

${p.content}

Platform :- SafeZone  
Explore more cyber incident updates at: https://sohamsingh2007.github.io/CEP/`;

        navigator.clipboard.writeText(text);

        showToast("Copied to clipboard", "info");
      };

      onSnapshot(collection(db, "posts"), (snapshot) => {
        posts = [];

        snapshot.forEach((d) => {
          posts.push({ id: d.id, ...d.data() });
        });

        // newest post first
        posts.sort((a, b) => {
          let dateA = a.date?.toDate ? a.date.toDate() : new Date(a.date);
          let dateB = b.date?.toDate ? b.date.toDate() : new Date(b.date);
          return dateB - dateA;
        });

        render();
      });

      function render() {
        let feed = "";
        let mine = "";
        let tagCount = {};
        let totalLikes = 0;

        const heartOutline = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-heart"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.572" /></svg>`;
        const heartFilled = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#ff2d55" stroke="#F91880" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-solid icon-tabler-heart"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.572" /></svg>`;

        posts.forEach((p) => {
          extractTags(p.content).forEach((t) => {
            tagCount[t] = (tagCount[t] || 0) + 1;
          });

          if (filterTag && !p.content.includes(filterTag)) return;

          feed += `

<div class="post">

<div style="display:flex;gap:10px;align-items:center">

<img src="${p.photo}" style="width:35px;height:35px;border-radius:50%">

<div>

<b>${p.username}</b>

<div class="post-time">${formatDate(p.date)}</div>

</div>

</div>

<div style="margin-top:6px">${makeTagsClickable(p.content)}</div>

<div class="post-footer">

<div class="post-action"
onclick='likePost("${p.id}",${p.likes},${JSON.stringify(p.likedBy || [])})'>
${(p.likedBy || []).includes(email) ? heartFilled : heartOutline} ${p.likes}
</div>

<div class="post-action"
onclick='sharePost(${JSON.stringify(p)})'>
🔗 Share
</div>

</div>

</div>
`;

          if (p.email === email) {
            mine += `

<div class="my-post" id="mypost-${p.id}">

<div class="post-content">${p.content}</div>

<div style="font-size:12px;color:#777">
${formatDate(p.date)} • ❤️ ${p.likes}
</div>

<button class="btn" onclick='startEdit("${p.id}")'>Edit</button>

<button class="btn" onclick='openDeleteModal("${p.id}")'>Delete</button>

</div>

`;
          }

          if (p.email === email) {
            totalLikes += p.likes;
          }
        });

        document.getElementById("posts").innerHTML = feed;
        document.getElementById("myPosts").innerHTML = mine;
        document.getElementById("postCount").innerText =
          mine.split("my-post").length - 1;
        document.getElementById("likeCount").innerText = totalLikes;

        let trendHTML = "";
        // ACTIVE FILTER SHOW
        if (filterTag) {
          trendHTML += `
  <div class="active-filter">
    ${filterTag}
    <span onclick="clearFilter()">✕</span>
  </div>
  `;
        }

        Object.entries(tagCount)
          .filter((t) => t[1] >= 3)
          .forEach((t) => {
            trendHTML += `
<div class="trend" onclick="setTagFilter('${t[0]}')">
${t[0]} (${t[1]})
</div>
`;
          });

        document.getElementById("trending").innerHTML = trendHTML;
      }

      window.logout = function () {
        localStorage.removeItem("safezoneUser");

        window.location.href = "login&Signup.html";
      };

      window.startEdit = function (id) {
        const post = posts.find((p) => p.id === id);

        const box = document.getElementById("mypost-" + id);

        box.innerHTML = `

<textarea id="edit-${id}" 
style="width:100%;height:70px;background:#111;color:white;border:1px solid #333;border-radius:6px;padding:6px;">
${post.content}
</textarea>

<br><br>

<button class="btn" onclick='saveEdit("${id}")'>Save</button>

<button class="btn" onclick='cancelEdit("${id}")'>Cancel</button>

`;
      };

      window.saveEdit = async function (id) {
        const newText = document.getElementById("edit-" + id).value.trim();

        if (!newText) {
          showToast("Post cannot be empty", "error");
          return;
        }

        await updateDoc(doc(db, "posts", id), {
          content: newText,
        });
      };

      window.cancelEdit = function (id) {
        const post = posts.find((p) => p.id === id);

        const box = document.getElementById("mypost-" + id);

        box.innerHTML = `

<div class="post-content">${post.content}</div>

<div style="font-size:12px;color:#777">
${formatDate(post.date)} • ❤️ ${post.likes}
</div>

<button class="btn" onclick='startEdit("${id}")'>Edit</button>

<button class="btn" onclick='openDeleteModal("${id}")'>Delete</button>
`;
      };

      // toasted message
      function showToast(message, type = "info") {
        const toast = document.getElementById("toast");

        toast.innerText = message;

        toast.className = "";
        toast.classList.add("show");

        if (type === "success") toast.classList.add("toast-success");
        else if (type === "error") toast.classList.add("toast-error");
        else toast.classList.add("toast-info");

        setTimeout(() => {
          toast.classList.remove("show");
        }, 3000);
      }

      // delete confirmation modal
      let deletePostId = null;

      window.openDeleteModal = function (id) {
        deletePostId = id;
        document.getElementById("deleteModal").style.display = "flex";
      };

      window.closeDeleteModal = function () {
        document.getElementById("deleteModal").style.display = "none";
      };

      document.getElementById("confirmDelete").onclick = async function () {
        if (deletePostId) {
          await deleteDoc(doc(db, "posts", deletePostId));
          showToast("Post deleted", "error");
        }

        closeDeleteModal();
      };

      // filter by tag
      window.setTagFilter = function (tag) {
        filterTag = tag;
        render();
        showToast("Showing posts for " + tag, "info");
      };

      window.clearFilter = function () {
        filterTag = null;
        render();
        showToast("Showing all posts", "info");
      };

      // clickable # tags in post content
      function makeTagsClickable(text) {
        return text.replace(/#\w+/g, (tag) => {
          return `<span class="hashtag" onclick="setTagFilter('${tag}')">${tag}</span>`;
        });
      }
    </script>
  </body>
</html>
