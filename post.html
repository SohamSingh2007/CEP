<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeZone Community</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#f6f7f8;
    display:flex;
    justify-content:center;
}

/* Layout */
.wrapper{
    width:1000px;
    max-width:95%;
    display:flex;
    gap:20px;
    margin-top:20px;
}

/* Left Sidebar */
.sidebar{
    width:250px;
    background:white;
    padding:20px;
    border-radius:12px;
    height:fit-content;
}

.sidebar h3{
    margin-bottom:10px;
}

.sidebar p{
    font-size:14px;
    color:gray;
}

/* Main Feed */
.feed{
    flex:1;
}

/* Create Post Box */
.create-post{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

.create-post input,
.create-post textarea,
.create-post select{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
}

.create-post textarea{
    resize:none;
    height:80px;
}

.create-post button{
    background:#1d9bf0;
    color:white;
    border:none;
    padding:8px 16px;
    border-radius:20px;
    cursor:pointer;
    float:right;
}

.create-post button:hover{
    background:#0c7cd5;
}

/* Post Card */
.post-card{
    display:flex;
    background:white;
    margin-bottom:15px;
    border-radius:12px;
    overflow:hidden;
}

/* Vote Section (Reddit Style) */
.vote{
    width:60px;
    background:#f0f2f5;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-size:18px;
}

.vote button{
    background:none;
    border:none;
    cursor:pointer;
    font-size:18px;
}

.vote span{
    font-size:14px;
    margin:5px 0;
}

/* Post Content */
.post-content{
    padding:15px;
    flex:1;
}

.post-header{
    font-size:13px;
    color:gray;
    margin-bottom:5px;
}

.username{
    font-weight:600;
    color:#000;
}

.tag{
    background:#e8f5fe;
    color:#1d9bf0;
    padding:2px 8px;
    border-radius:10px;
    font-size:11px;
    margin-left:8px;
}

.post-text{
    font-size:15px;
    margin-top:5px;
}

.actions{
    margin-top:10px;
    font-size:13px;
    color:gray;
}

.actions span{
    margin-right:15px;
    cursor:pointer;
}

/* Responsive */
@media(max-width:768px){
    .wrapper{
        flex-direction:column;
    }
    .sidebar{
        width:100%;
    }
}

</style>
</head>
<body>

<div class="wrapper">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>SafeZone Community</h3>
        <p>Share your cyber fraud experiences and help others stay safe.</p>
        <br>
        <p><b>Popular Tags</b></p>
        <p>#Phishing</p>
        <p>#UPI_Fraud</p>
        <p>#Instagram_Hack</p>
        <p>#Bank_Scam</p>
    </div>

    <!-- Main Feed -->
    <div class="feed">

        <!-- Create Post -->
        <div class="create-post">
            <input type="text" id="username" placeholder="Your Name">
            
            <select id="tag">
                <option value="Phishing">Phishing</option>
                <option value="UPI Fraud">UPI Fraud</option>
                <option value="Instagram Hack">Instagram Hack</option>
                <option value="Bank Scam">Bank Scam</option>
            </select>

            <textarea id="content" placeholder="Describe your cyber incident..."></textarea>
            <button onclick="addPost()">Post</button>
            <div style="clear:both;"></div>
        </div>

        <div id="posts"></div>

    </div>

</div>

<script>

let posts = JSON.parse(localStorage.getItem("communityPosts")) || [];

function savePosts(){
    localStorage.setItem("communityPosts", JSON.stringify(posts));
}

function formatDate(date){
    return new Date(date).toLocaleString();
}

function renderPosts(){
    const container = document.getElementById("posts");
    container.innerHTML = "";

    posts.slice().reverse().forEach((post,index)=>{

        container.innerHTML += `
        <div class="post-card">
            <div class="vote">
                <button onclick="upvote(${index})">⬆️</button>
                <span>${post.votes}</span>
                <button onclick="downvote(${index})">⬇️</button>
            </div>

            <div class="post-content">
                <div class="post-header">
                    <span class="username">${post.username}</span> · 
                    ${formatDate(post.date)}
                    <span class="tag">${post.tag}</span>
                </div>

                <div class="post-text">${post.content}</div>

                <div class="actions">
                    <span onclick="deletePost(${index})">Delete</span>
                </div>
            </div>
        </div>
        `;
    });
}

function addPost(){
    const username = document.getElementById("username").value.trim();
    const content = document.getElementById("content").value.trim();
    const tag = document.getElementById("tag").value;

    if(username==="" || content===""){
        alert("Fill all fields");
        return;
    }

    const newPost = {
        username,
        content,
        tag,
        date:new Date(),
        votes:0
    };

    posts.push(newPost);
    savePosts();
    renderPosts();

    document.getElementById("username").value="";
    document.getElementById("content").value="";
}

function upvote(index){
    posts[index].votes++;
    savePosts();
    renderPosts();
}

function downvote(index){
    posts[index].votes--;
    savePosts();
    renderPosts();
}

function deletePost(index){
    posts.splice(index,1);
    savePosts();
    renderPosts();
}

renderPosts();

</script>

</body>
</html>
