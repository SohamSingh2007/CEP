<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafeZone: News</title>
    <link rel="shortcut icon" href="logo.svg" type="image/x-icon" />
    <link rel="stylesheet" href="news.css">
  </head>
  <body>
    <div id="newsContainer" class="news-container"></div>
    <div id="loading" class="loading">Loading cyber news...</div>
    <script>
      let apiKey = "pub_53fdd1c113da41bea643302a42950768";

      let nextPage = "";
      let loading = false;
      let cooldown = false;
      let shownNews = new Set();

      function getQuery() {
        return "cyber attack OR hacking OR ransomware OR phishing OR bank fraud OR upi scam";
      }

      function createCard(news) {
        let img = news.image_url
          ? news.image_url
          : "https://via.placeholder.com/400x200?text=Cyber+News";

        return `
          <div class="news-card" onclick="window.open('${news.link}','_blank')">
            <img class="news-img" src="${img}">
            <div class="meta">
              <span>${news.source_id || "Source"}</span>
              <span>${news.country ? news.country.join(", ") : "Global"}</span>
            </div>
            <div class="news-title">${news.title}</div>
            <div class="news-desc">
              ${news.description || "Click to read full news"}
            </div>
            <div class="news-date">
              ${news.pubDate ? news.pubDate.substring(0, 10) : ""}
            </div>
            <div class="read-more">Read Full News →</div>
          </div>
        `;
      }

      function loadNews() {
        if (loading || cooldown) return;

        loading = true;
        cooldown = true;

        document.getElementById("loading").innerHTML = "Loading cyber news...";

        let query = getQuery();

        let url = `https://newsdata.io/api/1/news?apikey=${apiKey}&q=${encodeURIComponent(query)}&country=in,us,jp,cn,kr&language=en,hi&removeduplicate=1&size=10`;

        if (nextPage !== "") url += "&page=" + nextPage;

        fetch(url)
          .then((res) => res.json())

          .then((data) => {
            let container = document.getElementById("newsContainer");

            if (data.status === "error") {
              document.getElementById("loading").innerHTML =
                "API limit reached. Please wait 1 minute.";
              loading = false;
              return;
            }

            if (!data.results || data.results.length === 0) {
              document.getElementById("loading").innerHTML =
                "No more cyber news available";
              loading = false;
              return;
            }

            data.results.forEach((news) => {
              if (!news.title || !news.link) return;
              if (shownNews.has(news.link)) return;

              shownNews.add(news.link);

              container.insertAdjacentHTML("beforeend", createCard(news));
            });

            if (data.nextPage) {
              nextPage = data.nextPage;
              document.getElementById("loading").innerHTML =
                "Scroll down for more news";
            } else {
              document.getElementById("loading").innerHTML =
                "No more cyber news available";
            }

            loading = false;

            setTimeout(() => {
              cooldown = false;
            }, 2000);
          })

          .catch(() => {
            document.getElementById("loading").innerHTML =
              "Network error or API limit reached";
            loading = false;
          });
      }

      window.addEventListener("scroll", function () {
        if (
          window.innerHeight + window.pageYOffset >=
          document.documentElement.scrollHeight - 150
        ) {
          loadNews();
        }
      });
      loadNews();
    </script>
  </body>
</html>
